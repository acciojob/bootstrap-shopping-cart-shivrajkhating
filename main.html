<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shopping Cart</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Shopping Cart</h1>

<div class="container">

    <!-- Products -->
    <div class="products">

        <div class="item">
            <img src="https://rukminim2.flixcart.com/image/1176/1176/kg8avm80/mobile/j/f/9/apple-iphone-12-dummyapplefsn-original-imafwg8dkyh2zgrh.jpeg?q=90" width="80">

            <div class="info">
                <h3>iPhone</h3>
                <p>Display: 5 inches</p>
                <p>RAM: 4GB</p>
                <p>Memory: 32GB</p>
            </div>

            <input type="number" class="qty" value="1" min="0">

            <div class="price">$120</div>
        </div>

        <div class="item">
            <img src="https://rukminim2.flixcart.com/image/1176/1176/kg8avm80/mobile/j/f/9/apple-iphone-12-dummyapplefsn-original-imafwg8dkyh2zgrh.jpeg?q=90" width="80">

            <div class="info">
                <h3>iPhone</h3>
                <p>Display: 5 inches</p>
                <p>RAM: 4GB</p>
                <p>Memory: 32GB</p>
            </div>

            <input type="number" class="qty" value="1" min="0">

            <div class="price">$120</div>
        </div>

        <div class="item">
            <img src="https://rukminim2.flixcart.com/image/1176/1176/kg8avm80/mobile/j/f/9/apple-iphone-12-dummyapplefsn-original-imafwg8dkyh2zgrh.jpeg?q=90" width="80">

            <div class="info">
                <h3>iPhone</h3>
                <p>Display: 5 inches</p>
                <p>RAM: 4GB</p>
                <p>Memory: 32GB</p>
            </div>

            <input type="number" class="qty" value="1" min="0">

            <div class="price">$120</div>
        </div>

    </div>

    <!-- Summary -->
    <div class="summary">
        <h2>Summary</h2>

        <p>Subtotal: $<span id="subtotal">360</span></p>
        <p>Discount: $0</p>
        <p>Shipping: $0</p>

        <h3>Total: $<span id="total">360</span></h3>

        <button>Checkout</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
