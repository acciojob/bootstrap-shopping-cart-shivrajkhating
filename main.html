<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shopping Cart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Shopping cart</h1>
    <p class="subtitle">
      The customer is very important, the customer will be followed by the customer.
    </p>

    <div class="cart-wrapper">

      <!-- Left Side Products -->
      <div class="products">

        <div class="product">
          <img src="https://rukminim2.flixcart.com/image/1176/1176/kg8avm80/mobile/j/f/9/apple-iphone-12-dummyapplefsn-original-imafwg8dkyh2zgrh.jpeg?q=90" alt="phone">
          <div class="details">
            <h3>I am very sorry</h3>
            <p>Display: 5 inches</p>
            <p>RAM: 4GB</p>
            <p>Memory: 32GB</p>
          </div>

          <div class="quantity">
            <label>Quantity:</label>
            <input type="number" value="1">
          </div>

          <div class="price">$120</div>
        </div>

        <!-- Repeat Product -->
        <div class="product">
          <img src="https://rukminim2.flixcart.com/image/1176/1176/kg8avm80/mobile/j/f/9/apple-iphone-12-dummyapplefsn-original-imafwg8dkyh2zgrh.jpeg?q=90" alt="phone">
          <div class="details">
            <h3>I am very sorry</h3>
            <p>Display: 5 inches</p>
            <p>RAM: 4GB</p>
            <p>Memory: 32GB</p>
          </div>

          <div class="quantity">
            <label>Quantity:</label>
            <input type="number" value="1">
          </div>

          <div class="price">$120</div>
        </div>

      </div>

      <!-- Right Side Summary -->
      <div class="summary">
        <h2>Summary</h2>

        <div class="summary-item">
          <span>Subtotal</span>
          <span>$360</span>
        </div>

        <div class="summary-item">
          <span>Discount</span>
          <span>$0</span>
        </div>

        <div class="summary-item">
          <span>Shipping</span>
          <span>$0</span>
        </div>

        <div class="summary-item total">
          <span>Total</span>
          <span>$360</span>
        </div>

        <button>Checkout</button>
      </div>

    </div>
  </div>

</body>
</html>
